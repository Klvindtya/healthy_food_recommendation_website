<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Rekomendasi Makanan Sehat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Cek Rekomendasi Makanan Sehat</h1>

    <form id="foodForm">
        <label>Usia: <span id="ageValue">25</span> tahun</label><br>
        <input type="range" id="age" name="age" min="15" max="80" value="25" oninput="document.getElementById('ageValue').innerText = this.value"><br><br>

        <label>Jenis Kelamin</label><br>
        <select name="gender">
            <option value="Pria">Pria</option>
            <option value="Wanita">Wanita</option>
        </select><br><br>

        <label>Berat Badan (kg)</label><br>
        <input type="number" step="0.1" name="weight" placeholder="65" required><br><br>

        <label>Tinggi Badan (cm)</label><br>
        <input type="number" step="0.1" name="height" placeholder="165" required><br><br>

        <label>Tingkat Aktivitas</label><br>
        <select name="activity_level">
            <option value="Sedentary">Sedentary</option>
            <option value="Lightly Active">Lightly Active</option>
            <option value="Moderately Active">Moderately Active</option>
            <option value="Very Active">Very Active</option>
        </select><br><br>

        <label>Kondisi Kesehatan</label><br>
        <select name="health_condition">
            <option value="Normal">Normal</option>
            <option value="Diabetes">Diabetes</option>
            <option value="Hypertension">Hypertension</option>
            <option value="High Cholesterol">High Cholesterol</option>
            <option value="Obesity">Obesity</option>
        </select><br><br>

        <label>Jam Tidur (jam/hari)</label><br>
        <input type="number" step="0.5" name="sleep_hours" placeholder="8" required><br><br>

        <label>Olahraga (jam/minggu)</label><br>
        <input type="number" step="0.5" name="weekly_exercise" placeholder="3" required><br><br>

        <button type="submit">Dapatkan Rekomendasi</button>
    </form>

    <div id="loading" style="display: none;">Menganalisis data...</div>

    <div id="resultArea"></div>

    <div id="chartArea" style="display: none;">
        <h3>Analisis Rekomendasi Makanan</h3>
        <div style="display: flex; gap: 20px;">
            <div>
                <h4>Health Score Makanan</h4>
                <canvas id="chartHealthScore"></canvas>
            </div>
            <div>
                <h4>Distribusi Kategori</h4>
                <canvas id="chartCategory"></canvas>
            </div>
            <div>
                <h4>Rata-rata Kandungan Nutrisi</h4>
                <canvas id="chartNutrisi"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chartHealthScore = null;
        let chartCategory = null;
        let chartNutrisi = null;

        document.getElementById('foodForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            // 1. Buat elemen overlay loading secara dinamis ke dalam body (image_0bf4d0.png)
            const loadingOverlay = document.createElement('div');
            loadingOverlay.id = 'dynamicLoadingOverlay';
            loadingOverlay.innerHTML = `
                <div class="loading-container">
                    <div class="loading-logo-animation">
                        <div class="pulse-ring"></div>
                        <span class="animated-leaf">🍃</span>
                    </div>
                    <h2>Menganalisis Data Anda</h2>
                    <p>AI sedang memproses profil kesehatan Anda untuk memberikan rekomendasi yang tepat</p>
                    
                    <div class="progress-bar-wrapper">
                        <div class="progress-info">
                            <span>Progres Analisis</span>
                            <span id="dynProgressText">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div id="dynProgressBarFill" class="progress-bar-fill"></div>
                        </div>
                    </div>

                    <ul class="loading-steps">
                        <li id="dynStep1" class="step">Menganalisis data kesehatan Anda...</li>
                        <li id="dynStep2" class="step">Menghitung indeks massa tubuh...</li>
                        <li id="dynStep3" class="step">Mencocokkan pola nutrisi optimal...</li>
                        <li id="dynStep4" class="step">Memproses rekomendasi makanan...</li>
                        <li id="dynStep5" class="step">Menyiapkan hasil analisis...</li>
                    </ul>
                </div>
            `;
            document.body.appendChild(loadingOverlay);

            // Sembunyikan elemen lama agar bersih saat proses pemuatan berlangsung
            document.getElementById('chartArea').style.display = 'none';
            document.getElementById('resultArea').innerHTML = '';

            // 2. Fungsi menjalankan jalannya progress bar simulasi
            const runAnimation = () => {
                return new Promise((resolve) => {
                    const bar = document.getElementById('dynProgressBarFill');
                    const txt = document.getElementById('dynProgressText');
                    let progress = 0;
                    
                    const interval = setInterval(() => {
                        progress += 2;
                        if (bar) bar.style.width = progress + '%';
                        if (txt) txt.innerText = progress + '%';

                        if(progress >= 20) document.getElementById('dynStep1').className = 'step active checked';
                        if(progress >= 40) document.getElementById('dynStep2').className = 'step active checked';
                        if(progress >= 60) document.getElementById('dynStep3').className = 'step active checked';
                        if(progress >= 80) document.getElementById('dynStep4').className = 'step active';
                        if(progress >= 95) document.getElementById('dynStep5').className = 'step active';

                        if (progress >= 100) {
                            clearInterval(interval);
                            setTimeout(resolve, 300);
                        }
                    }, 35);
                });
            };

            const animationPromise = runAnimation();

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                // Tunggu progress bar menyentuh angka 100% baru hilangkan screen
                await animationPromise;
                loadingOverlay.remove();

                if (!result.success) {
                    document.getElementById('resultArea').innerHTML = `<p style="color:red; text-align:center;">Error: ${result.error}</p>`;
                    return;
                }

                // 3. Render Tabel Rekomendasi ke dalam resultArea bawaan asli
                let html = `
                    <h3>Diet Terprediksi: <b style="color: #3cb371;">${result.predicted_diet.replace('_', ' ')}</b> (${(result.confidence).toFixed(1)}%)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama Makanan</th>
                                <th>Kategori</th>
                                <th>Kalori (kcal)</th>
                                <th>Protein (g)</th>
                                <th>Lemak (g)</th>
                                <th>Karbo (g)</th>
                                <th>Serat (g)</th>
                                <th>Health Score</th>
                            </tr>
                        </thead>
                        <tbody>`;

                result.recommendations.forEach((food, i) => {
                    html += `
                        <tr>
                            <td>${i + 1}</td>
                            <td><b>${food.food_name || '-'}</b></td>
                            <td>${food.food_type || '-'}</td>
                            <td>${(food.calories || 0).toFixed(0)}</td>
                            <td>${(food.protein || 0).toFixed(1)}</td>
                            <td>${(food.fat || 0).toFixed(1)}</td>
                            <td>${(food.carbs || 0).toFixed(1)}</td>
                            <td>${(food.fiber || 0).toFixed(1)}</td>
                            <td><b>${(food.health_score || 0).toFixed(0)}</b></td>
                        </tr>`;
                });
                
                html += `</tbody></table>`;
                document.getElementById('resultArea').innerHTML = html;

                // 4. Munculkan area grafik dan lakukan render Chart.js
                document.getElementById('chartArea').style.display = 'block';

                const foods = result.recommendations;
                const foodNames = foods.map(f => (f.food_name || '').substring(0, 15));
                const healthScores = foods.map(f => f.health_score || 0);

                const catCount = {};
                foods.forEach(f => {
                    const cat = f.food_type || 'Other';
                    catCount[cat] = (catCount[cat] || 0) + 1;
                });

                const avgNutrisi = {
                    protein: foods.reduce((s, f) => s + (f.protein || 0), 0) / foods.length,
                    carbs:   foods.reduce((s, f) => s + (f.carbs || 0), 0) / foods.length,
                    fat:     foods.reduce((s, f) => s + (f.fat || 0), 0) / foods.length,
                    fiber:   foods.reduce((s, f) => s + (f.fiber || 0), 0) / foods.length,
                };

                if (chartHealthScore) chartHealthScore.destroy();
                if (chartCategory) chartCategory.destroy();
                if (chartNutrisi) chartNutrisi.destroy();

                Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";

                // Grafik 1 — Bar Horizontal Health Score
                chartHealthScore = new Chart(document.getElementById('chartHealthScore'), {
                    type: 'bar',
                    data: {
                        labels: foodNames,
                        datasets: [{
                            data: healthScores,
                            backgroundColor: '#3cb371',
                            borderRadius: 4
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { min: 0, max: 100 } }
                    }
                });

                // Grafik 2 — Pie Chart Kategori Makanan
                chartCategory = new Chart(document.getElementById('chartCategory'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(catCount),
                        datasets: [{
                            data: Object.values(catCount),
                            backgroundColor: ['#e28743', '#76b5c5', '#873e23', '#1e3d59', '#cbd5e1']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom' } }
                    }
                });

                // Grafik 3 — Bar Vertikal Rata-rata Nutrisi
                chartNutrisi = new Chart(document.getElementById('chartNutrisi'), {
                    type: 'bar',
                    data: {
                        labels: ['Protein', 'Karbo', 'Lemak', 'Serat'],
                        datasets: [{
                            data: [avgNutrisi.protein, avgNutrisi.carbs, avgNutrisi.fat, avgNutrisi.fiber],
                            backgroundColor: ['#3cb371', '#e28743', '#ff7f50', '#76b5c5'],
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });

            } catch (err) {
                if (document.getElementById('dynamicLoadingOverlay')) {
                    document.getElementById('dynamicLoadingOverlay').remove();
                }
                console.error(err);
                alert('Terjadi kendala saat menghubungkan ke server.');
            }
        });
    </script>
</body>
</html>
