<!DOCTYPE html>
<html>
<head>
    <title>Cek Rekomendasi Makanan Sehat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Cek Rekomendasi Makanan Sehat</h1>

    <form id="foodForm">
        <label>Usia: <span id="ageValue">25</span> tahun</label><br>
        <input type="range" id="age" name="age" min="15" max="80" value="25"
               oninput="document.getElementById('ageValue').innerText = this.value"><br><br>

        <label>Jenis Kelamin</label><br>
        <select name="gender">
            <option value="Pria">Pria</option>
            <option value="Wanita">Wanita</option>
        </select><br><br>

        <label>Berat Badan (kg)</label><br>
        <input type="number" step="0.1" name="weight" required><br><br>

        <label>Tinggi Badan (cm)</label><br>
        <input type="number" step="0.1" name="height" required><br><br>

        <label>Tingkat Aktivitas</label><br>
        <select name="activity_level">
            <option value="Sedentary">Sedentary</option>
            <option value="Lightly Active">Lightly Active</option>
            <option value="Moderately Active">Moderately Active</option>
            <option value="Very Active">Very Active</option>
        </select><br><br>

        <label>Kondisi Kesehatan</label><br>
        <select name="health_condition">
            <option value="Normal">Normal</option>
            <option value="Diabetes">Diabetes</option>
            <option value="Hypertension">Hypertension</option>
            <option value="High Cholesterol">High Cholesterol</option>
            <option value="Obesity">Obesity</option>
        </select><br><br>

        <label>Jam Tidur (jam/hari)</label><br>
        <input type="number" step="0.5" name="sleep_hours" required><br><br>

        <label>Olahraga (jam/minggu)</label><br>
        <input type="number" step="0.5" name="weekly_exercise" required><br><br>

        <button type="submit">Dapatkan Rekomendasi</button>
    </form>

    <div id="loading" style="display:none;">⏳ Memproses...</div>
    <div id="resultArea"></div>

    <!-- Canvas untuk grafik -->
    <div id="chartArea" style="display:none;">
        <h3>Analisis Rekomendasi Makanan</h3>
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="flex:1; min-width:280px;">
                <h4>Health Score Makanan</h4>
                <canvas id="chartHealthScore"></canvas>
            </div>
            <div style="flex:1; min-width:280px;">
                <h4>Distribusi Kategori</h4>
                <canvas id="chartCategory"></canvas>
            </div>
            <div style="flex:1; min-width:280px;">
                <h4>Rata-rata Kandungan Nutrisi</h4>
                <canvas id="chartNutrisi"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chartHealthScore = null;
        let chartCategory = null;
        let chartNutrisi = null;

        document.getElementById('foodForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const resultArea = document.getElementById('resultArea');
            const chartArea = document.getElementById('chartArea');
            const loading = document.getElementById('loading');

            resultArea.innerHTML = '';
            chartArea.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                loading.style.display = 'none';

                if (!result.success) {
                    resultArea.innerHTML = `<p style="color:red">Error: ${result.error}</p>`;
                    return;
                }

                // ── Tabel hasil ──
                let html = `
                    <h3>Diet yang Direkomendasikan</h3>
                    <p><b>${result.predicted_diet.replace('_', ' ')}</b> (Keyakinan: ${result.confidence.toFixed(1)}%)</p>
                    <h3>Rekomendasi Makanan</h3>
                    <table border="1" cellpadding="5">
                        <tr>
                            <th>No</th><th>Nama Makanan</th><th>Kategori</th>
                            <th>Kalori (kcal)</th><th>Protein (g)</th><th>Lemak (g)</th>
                            <th>Karbo (g)</th><th>Serat (g)</th><th>Health Score</th>
                        </tr>`;

                result.recommendations.forEach((food, i) => {
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td>${food.food_name || '-'}</td>
                        <td>${food.food_type || '-'}</td>
                        <td>${(food.calories || 0).toFixed(0)}</td>
                        <td>${(food.protein || 0).toFixed(1)}</td>
                        <td>${(food.fat || 0).toFixed(1)}</td>
                        <td>${(food.carbs || 0).toFixed(1)}</td>
                        <td>${(food.fiber || 0).toFixed(1)}</td>
                        <td>${(food.health_score || 0).toFixed(1)}</td>
                    </tr>`;
                });
                html += `</table>`;
                resultArea.innerHTML = html;

                // ── Data untuk grafik ──
                const foods = result.recommendations;
                const foodNames = foods.map(f => (f.food_name || '').substring(0, 20));
                const healthScores = foods.map(f => f.health_score || 0);

                // Hitung distribusi kategori
                const catCount = {};
                foods.forEach(f => {
                    const cat = f.food_type || 'Other';
                    catCount[cat] = (catCount[cat] || 0) + 1;
                });
                const catLabels = Object.keys(catCount);
                const catValues = Object.values(catCount);

                // Rata-rata nutrisi
                const avgNutrisi = {
                    protein: foods.reduce((s, f) => s + (f.protein || 0), 0) / foods.length,
                    carbs:   foods.reduce((s, f) => s + (f.carbs || 0), 0) / foods.length,
                    fat:     foods.reduce((s, f) => s + (f.fat || 0), 0) / foods.length,
                    fiber:   foods.reduce((s, f) => s + (f.fiber || 0), 0) / foods.length,
                };

                chartArea.style.display = 'block';

                // Destroy chart lama kalau ada
                if (chartHealthScore) chartHealthScore.destroy();
                if (chartCategory) chartCategory.destroy();
                if (chartNutrisi) chartNutrisi.destroy();

                // Chart 1 — Health Score (horizontal bar)
                chartHealthScore = new Chart(document.getElementById('chartHealthScore'), {
                    type: 'bar',
                    data: {
                        labels: foodNames,
                        datasets: [{
                            label: 'Health Score',
                            data: healthScores,
                            backgroundColor: 'rgba(60, 179, 113, 0.8)',
                        }]
                    },
                    options: {
                        indexAxis: 'y',
                        plugins: { legend: { display: false } },
                        scales: { x: { min: 0, max: 100 } }
                    }
                });

                // Chart 2 — Pie kategori
                chartCategory = new Chart(document.getElementById('chartCategory'), {
                    type: 'pie',
                    data: {
                        labels: catLabels,
                        datasets: [{
                            data: catValues,
                            backgroundColor: [
                                '#4dc9f6','#f67019','#f53794',
                                '#537bc4','#acc236','#166a8f','#00a950'
                            ]
                        }]
                    }
                });

                // Chart 3 — Bar nutrisi rata-rata
                chartNutrisi = new Chart(document.getElementById('chartNutrisi'), {
                    type: 'bar',
                    data: {
                        labels: ['Protein', 'Karbo', 'Lemak', 'Serat'],
                        datasets: [{
                            label: 'gram per 100g',
                            data: [avgNutrisi.protein, avgNutrisi.carbs,
                                   avgNutrisi.fat, avgNutrisi.fiber],
                            backgroundColor: ['#4472c4','#ed7d31','#ffc000','#70ad47']
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

            } catch (err) {
                loading.style.display = 'none';
                resultArea.innerHTML = `<p style="color:red">Gagal memproses: ${err}</p>`;
            }
        });
    </script>
</body>
</html>
